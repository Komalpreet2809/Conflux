# Conflux — one-command run for reviewers:  docker compose up --build
# Web:  http://localhost:3000   |   API:  http://localhost:8000  (docs: /docs)

services:
  api:
    build: ./api
    container_name: conflux-api
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 6

  web:
    build:
      context: ./web
      args:
        # The browser (on the host) reaches the API via the host-mapped port.
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: conflux-web
    ports:
      - "3000:3000"
    depends_on:
      - api
